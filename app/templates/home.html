{% extends "base.html" %}
{% block title %}首頁 — QVault{% endblock %}

{% block content %}
<!-- Welcome header -->
<div class="mb-10">
    <h1 class="text-[28px] font-bold text-[#1f1f1f] tracking-tight">歡迎回來</h1>
    <p class="text-[14px] text-[#5f6368] mt-1">FA 案例管理平台</p>
</div>

<!-- Quick action cards — Google Workspace style -->
<div class="grid grid-cols-3 gap-4">
    <a href="/upload" class="group card bg-white rounded-xl p-6 block">
        <div class="w-12 h-12 rounded-full bg-[#e8f0fe] flex items-center justify-center mb-4 group-hover:bg-[#d2e3fc] transition-colors">
            <span class="material-icons-outlined text-accent text-[24px]">cloud_upload</span>
        </div>
        <h2 class="text-[15px] font-semibold text-[#1f1f1f] mb-1 group-hover:text-accent transition-colors">上傳周報</h2>
        <p class="text-[13px] text-[#5f6368] leading-relaxed">上傳 .pptx 周報檔案，系統自動分類並提取案例資料</p>
    </a>

    <a href="/weeks" class="group card bg-white rounded-xl p-6 block">
        <div class="w-12 h-12 rounded-full bg-[#e6f4ea] flex items-center justify-center mb-4 group-hover:bg-[#ceead6] transition-colors">
            <span class="material-icons-outlined text-teal text-[24px]">folder_open</span>
        </div>
        <h2 class="text-[15px] font-semibold text-[#1f1f1f] mb-1 group-hover:text-teal transition-colors">週報總覽</h2>
        <p class="text-[13px] text-[#5f6368] leading-relaxed">瀏覽每週報告的處理狀態、案例統計與提取進度</p>
    </a>

    <a href="/cases" class="group card bg-white rounded-xl p-6 block">
        <div class="w-12 h-12 rounded-full bg-[#fef7e0] flex items-center justify-center mb-4 group-hover:bg-[#feefc3] transition-colors">
            <span class="material-icons-outlined text-[#ea8600] text-[24px]">table_chart</span>
        </div>
        <h2 class="text-[15px] font-semibold text-[#1f1f1f] mb-1 group-hover:text-[#ea8600] transition-colors">案例管理</h2>
        <p class="text-[13px] text-[#5f6368] leading-relaxed">搜尋、編輯與管理所有失效分析案例，支援直接表格編輯</p>
    </a>
</div>
{% endblock %}
