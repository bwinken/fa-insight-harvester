{% extends "base.html" %}
{% block title %}上傳周報 — QVault{% endblock %}

{% block content %}
<div class="page-header">
    <h1>上傳周報</h1>
    <div class="page-header-actions">
        <a href="/" class="btn btn-outline">
            <span class="material-icons-outlined" style="font-size: 18px;">arrow_back</span>
            返回首頁
        </a>
    </div>
</div>

<!-- Step 1: Upload form -->
<div class="card" id="uploadCard" style="max-width: 720px;">
    <form id="uploadForm">
        <!-- Week selection -->
        <div style="margin-bottom: 24px;">
            <p style="font-size: 14px; font-weight: 500; color: #80868b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;">周次選擇</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 500; color: #3c4043; margin-bottom: 6px;">年度</label>
                    <input type="number" id="year" name="year" class="input-field" style="width: 100%;">
                </div>
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 500; color: #3c4043; margin-bottom: 6px;">第幾周</label>
                    <input type="number" id="week_number" name="week_number" min="1" max="53" class="input-field" style="width: 100%;">
                </div>
            </div>
        </div>

        <!-- File upload -->
        <div style="margin-bottom: 24px;">
            <p style="font-size: 14px; font-weight: 500; color: #80868b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;">檔案上傳</p>
            <div class="upload-area" id="dropZone">
                <span class="material-icons-outlined" style="font-size: 48px; color: #dadce0; margin-bottom: 12px; display: block;">upload_file</span>
                <p style="font-size: 16px; color: #3c4043; margin: 0 0 4px;" id="dropText">拖放 .pptx 檔案到這裡，或點擊選擇</p>
                <p style="font-size: 13px; color: #5f6368; margin: 0;">支援格式: .pptx</p>
                <input type="file" id="fileInput" name="file" accept=".pptx" style="display: none;">
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button type="submit" id="submitBtn" class="btn btn-primary" disabled style="opacity: 0.5;">
                <span class="material-icons-outlined" style="font-size: 18px;">cloud_upload</span>
                上傳並開始處理
            </button>
        </div>
    </form>
</div>

<!-- Progress section -->
<div id="progressSection" style="display: none; max-width: 720px; margin-top: 16px;">
    <div class="card">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
            <div class="spinner"></div>
            <div>
                <p style="font-size: 15px; font-weight: 500; color: #202124; margin: 0;">處理進度</p>
                <p id="progressText" style="font-size: 13px; color: #5f6368; margin: 2px 0 0;"></p>
            </div>
        </div>
        <div id="progressMessages" style="max-height: 180px; overflow-y: auto; margin-bottom: 16px;"></div>
        <div style="background: #f1f3f4; border-radius: 4px; height: 8px; overflow: hidden;">
            <div id="progressBar" style="background: #1a73e8; height: 100%; width: 0%; transition: width 0.5s ease; border-radius: 4px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const dropText = document.getElementById('dropText');
    const submitBtn = document.getElementById('submitBtn');
    const uploadForm = document.getElementById('uploadForm');
    const progressSection = document.getElementById('progressSection');

    // Set default week number
    const now = new Date();
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
    document.getElementById('week_number').value = weekNum;
    document.getElementById('year').value = now.getFullYear();

    // Drag & drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            onFileSelected();
        }
    });
    fileInput.addEventListener('change', onFileSelected);

    function onFileSelected() {
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            dropText.textContent = file.name;
            dropZone.style.borderColor = '#1e8e3e';
            dropZone.style.background = '#e6f4ea';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        }
    }

    // Upload
    async function doUpload(overwrite = false) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="material-icons-outlined" style="font-size: 18px;">hourglass_top</span> 上傳中...';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const year = document.getElementById('year').value;
        const week = document.getElementById('week_number').value;

        try {
            const url = `/api/upload?year=${year}&week_number=${week}` + (overwrite ? '&overwrite=true' : '');
            const resp = await fetch(url, { method: 'POST', body: formData });
            const data = await resp.json();

            if (resp.status === 409) {
                const detail = data.detail;
                const msg = `${detail.message}\n\n` +
                    `狀態: ${detail.existing_status}\n` +
                    `建立時間: ${detail.existing_created_at}\n\n` +
                    `是否要覆蓋此記錄？（原有案例資料將被刪除）`;
                if (confirm(msg)) {
                    await doUpload(true);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span class="material-icons-outlined" style="font-size: 18px;">cloud_upload</span> 上傳並開始處理';
                }
                return;
            }

            if (!resp.ok) {
                alert('上傳失敗: ' + (data.detail?.message || data.detail || '未知錯誤'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="material-icons-outlined" style="font-size: 18px;">cloud_upload</span> 上傳並開始處理';
                return;
            }

            document.getElementById('uploadCard').style.display = 'none';
            progressSection.style.display = 'block';
            connectSSE(data.report_id);
        } catch (err) {
            alert('上傳失敗: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span class="material-icons-outlined" style="font-size: 18px;">cloud_upload</span> 上傳並開始處理';
        }
    }

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        await doUpload();
    });

    function connectSSE(reportId) {
        const evtSource = new EventSource(`/api/upload/${reportId}/progress`);
        const messages = document.getElementById('progressMessages');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        evtSource.addEventListener('status', (e) => {
            const data = JSON.parse(e.data);
            addMessage(messages, data.message, '#1a73e8');
        });

        evtSource.addEventListener('prefilter', (e) => {
            const data = JSON.parse(e.data);
            addMessage(messages, `預篩選完成: ${data.total_slides} 頁中有 ${data.candidate_count} 頁為候選案例頁`, '#1e8e3e');
        });

        evtSource.addEventListener('classify_progress', (e) => {
            const data = JSON.parse(e.data);
            const pct = Math.round((data.completed / data.total) * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = `VLM 分類中 ${data.completed}/${data.total} 頁...`;
        });

        evtSource.addEventListener('complete', (e) => {
            const data = JSON.parse(e.data);
            evtSource.close();
            progressBar.style.width = '100%';
            progressBar.style.background = '#1e8e3e';
            addMessage(messages, `分類完成！${data.case_count} 案例 · ${data.not_case_count} 非案例 · ${data.error_count} 錯誤`, '#1e8e3e');
            setTimeout(() => { window.location.href = `/reports/${data.report_id}/triage`; }, 1500);
        });

        evtSource.addEventListener('error', (e) => {
            try {
                const data = JSON.parse(e.data);
                addMessage(messages, data.message, '#d93025');
            } catch {
                addMessage(messages, '處理過程發生錯誤', '#d93025');
            }
            evtSource.close();
            progressBar.style.background = '#d93025';
        });
    }

    function addMessage(container, text, color) {
        const div = document.createElement('div');
        div.style.cssText = `font-size: 13px; color: ${color}; padding: 4px 0; display: flex; align-items: center; gap: 8px;`;
        div.innerHTML = `<span style="width: 6px; height: 6px; border-radius: 50%; background: ${color}; flex-shrink: 0;"></span>${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
{% endblock %}
