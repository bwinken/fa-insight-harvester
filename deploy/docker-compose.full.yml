# ╔════════════════════════════════════════════════════════════════╗
# ║  QVault — 全 Docker Compose（方案 B）                         ║
# ║  包含 PostgreSQL + oauth2-proxy + QVault App 三個服務          ║
# ║                                                                ║
# ║  如果你用方案 A（systemd + venv），請用 docker-compose.yml     ║
# ║  （只包含 PG + oauth2-proxy，app 由 systemd 管理）            ║
# ╚════════════════════════════════════════════════════════════════╝
#
# 用法：
#   cd deploy/
#   docker compose -f docker-compose.full.yml up -d
#
# 首次部署（建置 app image）：
#   docker compose -f docker-compose.full.yml up -d --build
#
# Air-gapped 環境建置：
#   # 在有 proxy 的機器上：
#   docker compose -f docker-compose.full.yml build \
#     --build-arg HTTP_PROXY=http://your-proxy:port \
#     --build-arg HTTPS_PROXY=http://your-proxy:port
#
#   # 匯出映像到 tarball（搬到無網路機器）：
#   docker save qvault-app pgvector/pgvector:pg16 \
#     quay.io/oauth2-proxy/oauth2-proxy:v7.7.1 | gzip > qvault-all-images.tar.gz
#
#   # 在目標機器載入：
#   docker load < qvault-all-images.tar.gz
#   docker compose -f docker-compose.full.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qvault-pg
    restart: unless-stopped
    # 不對外暴露 port，app 透過 Docker 內部網路連線
    # 如需外部工具連線（如 pgAdmin），取消下行註解
    # ports:
    #   - "127.0.0.1:${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-qvault}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ${PG_DB:-qvault}
    volumes:
      - ${PGDATA_DIR:-/mnt/db/qvault/pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER:-qvault}"]
      interval: 5s
      timeout: 3s
      retries: 5

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: qvault-oauth2-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:4180:4180"
    environment:
      # OIDC provider (Auth Center)
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:?OIDC_ISSUER_URL is required}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_CLIENT_ID:?OAUTH2_CLIENT_ID is required}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:?OAUTH2_CLIENT_SECRET is required}
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_REDIRECT_URL:?OAUTH2_REDIRECT_URL is required}

      # Cookie
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET:?OAUTH2_COOKIE_SECRET is required}
      OAUTH2_PROXY_COOKIE_NAME: ${OAUTH2_COOKIE_NAME:-_qvault_oauth2}
      OAUTH2_PROXY_COOKIE_SECURE: ${OAUTH2_COOKIE_SECURE:-false}
      OAUTH2_PROXY_COOKIE_SAMESITE: lax

      # Pass access token to Nginx via response header
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"

      # Reverse proxy mode (trust X-Forwarded-* from Nginx)
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_REAL_CLIENT_IP_HEADER: X-Real-IP

      # Listening
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180

      # Allow all authenticated users (scope-based RBAC is in the app)
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: qvault-app
    container_name: qvault-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # 注意：Docker 內部網路用 service name 'postgres' 連線，不是 localhost
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-qvault}:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/${PG_DB:-qvault}
      # VLM — 填入企業內部 LLM server 位址
      VLM_BASE_URL: ${VLM_BASE_URL:?VLM_BASE_URL is required}
      VLM_API_KEY: ${VLM_API_KEY:-dummy}
      VLM_MODEL: ${VLM_MODEL:?VLM_MODEL is required}
      VLM_EMBEDDING_MODEL: ${VLM_EMBEDDING_MODEL:?VLM_EMBEDDING_MODEL is required}
      # Paths（對應 volume mounts）
      UPLOAD_DIR: /data/uploads
      LOG_DIR: /data/logs
      AUTH_PUBLIC_KEY_PATH: /data/keys/public.pem
      # Production mode
      ENVIRONMENT: production
      DEV_SKIP_AUTH: "false"
    volumes:
      # 持久化資料（存在主機 /mnt/db/qvault/ 下）
      - ${DATA_DIR:-/mnt/db/qvault}/uploads:/data/uploads
      - ${DATA_DIR:-/mnt/db/qvault}/logs:/data/logs
      # 公鑰（唯讀掛載）
      - ${KEYS_DIR:-./keys}:/data/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
    # App 啟動前先跑 DB migration
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
